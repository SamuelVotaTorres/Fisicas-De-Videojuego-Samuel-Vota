<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Cinemática Básica - MRU y MRUV</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0b0f14;
            font-family: Arial, sans-serif;
        }

        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.65);
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 360px;
        }

        #info strong {
            color: #00eaff;
        }
    </style>
</head>

<body>
    <div id="info">
        <strong>Demo de Cinemática Básica</strong><br>
        Cubo rojo: MRU, velocidad constante.<br>
        Esfera azul: MRUV con aceleración/gravedad.<br>
        Cubo verde: control del usuario con aceleración.<br><br>
        Controles: WASD para mover el cubo verde.<br>
        Espacio: reiniciar esfera.
        <br><br>
        <span id="debug"></span>
    </div>

    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

        // ============================================================
        // CONFIGURACIÓN DE ESCENA
        // ============================================================

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0f14);

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        camera.position.set(0, 10, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Luz ambiental
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
        scene.add(ambientLight);

        // Luz direccional
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(6, 10, 8);
        scene.add(directionalLight);

        // Grid del mundo
        const grid = new THREE.GridHelper(30, 30, 0x444444, 0x222222);
        scene.add(grid);

        // Piso invisible/visual
        const floorGeometry = new THREE.PlaneGeometry(30, 30);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x111820,
            roughness: 0.9,
            metalness: 0.1
        });

        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        scene.add(floor);

        // ============================================================
        // OBJETO 1: MRU
        // Movimiento rectilíneo uniforme
        // x = x0 + vt
        // ============================================================

        const mruGeometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const mruMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333 });
        const mruCube = new THREE.Mesh(mruGeometry, mruMaterial);
        mruCube.position.set(-10, 0.6, -4);
        scene.add(mruCube);

        const mruVelocity = new THREE.Vector3(3, 0, 0); // unidades por segundo

        // ============================================================
        // OBJETO 2: MRUV
        // Movimiento con aceleración constante
        // Δx = v0t + 1/2at²
        // v = v0 + at
        // ============================================================

        const mruvGeometry = new THREE.SphereGeometry(0.65, 32, 32);
        const mruvMaterial = new THREE.MeshStandardMaterial({ color: 0x3399ff });
        const mruvSphere = new THREE.Mesh(mruvGeometry, mruvMaterial);
        scene.add(mruvSphere);

        let sphereStartPosition = new THREE.Vector3(-9, 1, 2);
        let sphereVelocity = new THREE.Vector3(4.5, 7.5, 0);
        let sphereAcceleration = new THREE.Vector3(0, -9.8, 0);

        function resetSphere() {
            mruvSphere.position.copy(sphereStartPosition);
            sphereVelocity.set(4.5, 7.5, 0);
        }

        resetSphere();

        // ============================================================
        // OBJETO 3: JUGADOR CONTROLABLE
        // Movimiento con aceleración, velocidad máxima y fricción
        // ============================================================

        const playerGeometry = new THREE.BoxGeometry(1.1, 1.1, 1.1);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff88 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.set(0, 0.55, 5);
        scene.add(player);

        const playerVelocity = new THREE.Vector3(0, 0, 0);
        const playerAcceleration = new THREE.Vector3(0, 0, 0);

        const playerAccelerationPower = 16;
        const playerMaxSpeed = 7;
        const playerFriction = 8;

        const keys = {
            w: false,
            a: false,
            s: false,
            d: false
        };

        window.addEventListener("keydown", (event) => {
            const key = event.key.toLowerCase();

            if (key in keys) {
                keys[key] = true;
            }

            if (event.code === "Space") {
                resetSphere();
            }
        });

        window.addEventListener("keyup", (event) => {
            const key = event.key.toLowerCase();

            if (key in keys) {
                keys[key] = false;
            }
        });

        // ============================================================
        // FUNCIONES DE ACTUALIZACIÓN FÍSICA
        // ============================================================

        function updateMRU(dt) {
            // Movimiento con velocidad constante:
            // posición = posición + velocidad * tiempo
            mruCube.position.addScaledVector(mruVelocity, dt);

            // Reinicio simple para mantener el objeto en pantalla
            if (mruCube.position.x > 10) {
                mruCube.position.x = -10;
            }
        }

        function updateMRUV(dt) {
            // Guardamos velocidad inicial del frame
            const initialVelocity = sphereVelocity.clone();

            // Fórmula de cinemática:
            // Δx = v0 * dt + 1/2 * a * dt²
            mruvSphere.position.addScaledVector(initialVelocity, dt);
            mruvSphere.position.addScaledVector(sphereAcceleration, 0.5 * dt * dt);

            // Actualización de velocidad:
            // v = v0 + a * dt
            sphereVelocity.addScaledVector(sphereAcceleration, dt);

            // Colisión simple con el piso
            if (mruvSphere.position.y < 0.65) {
                mruvSphere.position.y = 0.65;

                // Rebote con pérdida de energía
                sphereVelocity.y *= -0.65;

                // Fricción horizontal ligera al tocar el piso
                sphereVelocity.x *= 0.92;
            }

            // Reinicio si sale demasiado lejos
            if (mruvSphere.position.x > 12) {
                resetSphere();
            }
        }

        function updatePlayer(dt) {
            playerAcceleration.set(0, 0, 0);

            // Entrada del usuario
            if (keys.w) playerAcceleration.z -= playerAccelerationPower;
            if (keys.s) playerAcceleration.z += playerAccelerationPower;
            if (keys.a) playerAcceleration.x -= playerAccelerationPower;
            if (keys.d) playerAcceleration.x += playerAccelerationPower;

            // Si se mueve en diagonal, normalizamos para evitar velocidad extra
            if (playerAcceleration.lengthSq() > 0) {
                playerAcceleration.normalize().multiplyScalar(playerAccelerationPower);
            }

            // Aplicar aceleración
            playerVelocity.addScaledVector(playerAcceleration, dt);

            // Limitar velocidad máxima
            const horizontalSpeed = Math.sqrt(
                playerVelocity.x * playerVelocity.x +
                playerVelocity.z * playerVelocity.z
            );

            if (horizontalSpeed > playerMaxSpeed) {
                const scale = playerMaxSpeed / horizontalSpeed;
                playerVelocity.x *= scale;
                playerVelocity.z *= scale;
            }

            // Fricción cuando no hay input
            if (playerAcceleration.lengthSq() === 0) {
                const frictionAmount = Math.max(0, 1 - playerFriction * dt);
                playerVelocity.x *= frictionAmount;
                playerVelocity.z *= frictionAmount;
            }

            // Aplicar movimiento
            player.position.addScaledVector(playerVelocity, dt);

            // Limitar al área del escenario
            player.position.x = THREE.MathUtils.clamp(player.position.x, -13, 13);
            player.position.z = THREE.MathUtils.clamp(player.position.z, -13, 13);
        }

        // ============================================================
        // LOOP PRINCIPAL
        // ============================================================

        const clock = new THREE.Clock();
        const debug = document.getElementById("debug");

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.033);
            // Limitamos dt para evitar saltos raros si baja el rendimiento

            updateMRU(dt);
            updateMRUV(dt);
            updatePlayer(dt);

            debug.innerHTML = `
        MRU velocidad: ${mruVelocity.x.toFixed(2)} u/s<br>
        Esfera velocidad Y: ${sphereVelocity.y.toFixed(2)} u/s<br>
        Esfera aceleración Y: ${sphereAcceleration.y.toFixed(2)} u/s²<br>
        Player velocidad: ${playerVelocity.length().toFixed(2)} u/s
      `;

            renderer.render(scene, camera);
        }

        animate();

        // ============================================================
        // RESPONSIVE
        // ============================================================

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
